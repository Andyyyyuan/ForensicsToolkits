services:
  backend:
    image: "${BACKEND_IMAGE:-crpi-b0crof0akjbozky4.cn-hangzhou.personal.cr.aliyuncs.com/enxiaohao/forensicstoolkits-backend:latest}"
    container_name: "${COMPOSE_PROJECT_NAME:-forensicstoolkits}-backend"
    init: true
    pull_policy: always
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
    working_dir: /app
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    volumes:
      - "${BACKEND_DATA_DIR:-./data/backend/data}:/app/storage/data"
      - "${BACKEND_UPLOADS_DIR:-./data/backend/uploads}:/app/storage/uploads"
      - "${BACKEND_LOGS_DIR:-./data/backend/logs}:/app/storage/logs"
      - "${BACKEND_REPORTS_DIR:-./data/backend/reports}:/app/storage/reports"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - app-network

  frontend:
    image: "${FRONTEND_IMAGE:-crpi-b0crof0akjbozky4.cn-hangzhou.personal.cr.aliyuncs.com/enxiaohao/forensicstoolkits-frontend:latest}"
    container_name: "${COMPOSE_PROJECT_NAME:-forensicstoolkits}-frontend"
    init: true
    pull_policy: always
    restart: unless-stopped
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
    security_opt:
      - no-new-privileges:true
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      - app-network

networks:
  app-network:
    name: "${COMPOSE_PROJECT_NAME:-forensicstoolkits}-network"
